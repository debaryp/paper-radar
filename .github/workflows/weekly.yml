name: Weekly Paper Search
 
on:
  schedule:
    # Jeden Montag um 07:00 UTC (08:00 deutsche Zeit)
    - cron: '0 7 * * 1'
  # Manuell auslösen möglich über GitHub Actions UI
  workflow_dispatch:
 
jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Brauchen wir um weekly_update.json zu committen
 
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
 
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          # Nur stdlib — keine externen Pakete nötig
 
      - name: Paper-Suche ausführen
        run: python search.py
 
      - name: Ergebnisse committen und pushen
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Paper Radar Bot"
          git add weekly_update.json history.json
          # Nur committen wenn es Änderungen gibt
          git diff --staged --quiet || git commit -m "Weekly paper update $(date +'%Y-%m-%d')"
          git push
